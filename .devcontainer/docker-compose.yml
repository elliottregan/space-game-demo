services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: space-game-devcontainer

    env_file:
      - ../.env

    # Required for iptables firewall
    cap_add:
      - NET_ADMIN
      - NET_RAW

    ports:
      - "2222:22" # SSH
      - "5173:5173" # Vite dev server

    volumes:
      - ..:/workspace:cached
      - ~/.claude/.credentials.json:/tmp/host-credentials.json:ro
      - ~/.claude/settings.json:/home/dev/.claude/settings.json:ro
      - ~/.claude/plugins:/tmp/host-claude-plugins:ro
      - devcontainer-claude-plugins:/home/dev/.claude/plugins
      - devcontainer-gh-config:/home/dev/.config/gh
      - ~/.ssh:/home/dev/.ssh:ro
      - ~/.claude.json:/tmp/host-claude.json:ro

    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - VITE_HOST=0.0.0.0
      - USE_BUILTIN_RIPGREP=0

    tty: true
    stdin_open: true

volumes:
  devcontainer-gh-config:
  devcontainer-claude-plugins:
