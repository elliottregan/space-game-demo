services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: space-game-devcontainer

    ports:
      - "2222:22" # SSH
      - "5173:5173" # Vite dev server

    volumes:
      - ..:/workspace:cached
      - devcontainer-claude-config:/home/dev/.claude
      - devcontainer-gh-config:/home/dev/.config/gh
      - ~/.ssh:/home/dev/.ssh:ro

    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - VITE_HOST=0.0.0.0
      - USE_BUILTIN_RIPGREP=0

    tty: true
    stdin_open: true

volumes:
  devcontainer-claude-config:
  devcontainer-gh-config:
