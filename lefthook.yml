pre-commit:
  piped: true
  skip:
    - merge
    - rebase
  glob_matcher: doublestar
  commands:
    lint:
      priority: 1
      glob: "**/*.{ts,tsx,vue}"
      run: bunx oxlint --fix {staged_files}
      stage_fixed: true
    format:
      priority: 1
      glob: "**/*.{ts,tsx,vue,css}"
      run: bunx oxfmt --write --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true
    typecheck:
      priority: 2
      glob: "**/*.{ts,tsx,vue}"
      run: bun run typecheck
