pre-commit:
  piped: true
  skip:
    - merge
    - rebase
  glob_matcher: doublestar
  commands:
    # Priority 1: lint and format run in parallel.
    lint:
      priority: 1
      glob: "**/*.{ts,tsx,vue}"
      run: bunx oxlint --fix {staged_files}
      stage_fixed: true
    format:
      priority: 1
      glob: "**/*.{ts,tsx,vue,css,json,md}"
      run: bunx prettier --write --ignore-unknown {staged_files}
      stage_fixed: true
    # Priority 2: typecheck runs after lint/format. The glob filters which
    # staged files trigger it; tsc checks the full project.
    typecheck:
      priority: 2
      glob: "**/*.{ts,tsx,vue}"
      run: bun run typecheck
