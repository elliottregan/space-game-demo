[build]
  command = "bun run build && bun run build:visualizer"
  publish = "dist"

# Visualizer SPA routing
[[redirects]]
  from = "/visualizer/*"
  to = "/visualizer/index.html"
  status = 200

# Main game SPA routing (Vue Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
