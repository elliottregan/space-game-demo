[build]
  command = "bun run build"
  publish = "dist"

# SPA routing: redirect all requests to index.html for Vue Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
