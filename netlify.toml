[build]
  command = "bun run build && bun run build:visualizer"
  publish = "dist"

# Main game SPA routing (Vue Router)
# Note: /visualizer/ doesn't need SPA routing - it's a single page app without client-side routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
